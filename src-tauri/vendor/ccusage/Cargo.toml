[package]
name = "ccusage-vendor"
version = "20.0.2"
description = "Vendored ccusage Rust core (MIT); see VENDORING.md"
edition = "2021"
publish = false
build = "build.rs"

# Dependency versions are pinned to exactly what upstream ccusage v20.0.2
# (rust/crates/ccusage/Cargo.toml) declares for the modules we vendor. Do not
# upgrade opportunistically — matching upstream is the point (VENDORING.md).
[dependencies]
jiff = { version = "0.2.24", default-features = false, features = [
    "std",
    "tz-system",
    "tzdb-zoneinfo",
] }
memchr = "2"
compact_str = "0.9"
phf = { version = "0.13", features = ["macros"] }
rustc-hash = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smallvec = "1"
ureq = { version = "3.3.0", default-features = false, features = ["rustls"] }

# Only needed by the `#[cfg(test)]` snapshot test that came in with vendored
# `adapter/codex.rs` (`insta::assert_json_snapshot!`). Version pinned to
# exactly what upstream `rust/crates/ccusage/Cargo.toml`'s `[dev-dependencies]`
# declares for it, same rule as everything else in this file.
[dev-dependencies]
insta = { version = "1.47.2", features = ["json"] }
